<form (ngSubmit)="onSubmit(titleInput.value,textInput.value)" #form>
    <app-control class="control" label="Title">
        <input name="title" id="title" #titleInput #input/>
    </app-control>
        <app-control class="control" label="request">
        <input name="request" id="request" rows="3" #textInput  #input/>
    </app-control>
            <button appButton>
               Submit
                       <span ngProjectAs="icon">-></span>
          </button>

</form>
